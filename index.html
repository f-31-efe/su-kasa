  import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getDatabase, ref, get, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBxx084oGaqC2zg0X2KwC-nQRPVt_0JxCo",
    authDomain: "kasa-b11f4.firebaseapp.com",
    databaseURL: "https://kasa-b11f4-default-rtdb.firebaseio.com",
    projectId: "kasa-b11f4",
    storageBucket: "kasa-b11f4.firebasestorage.app",
    messagingSenderId: "1003259598669",
    appId: "1:1003259598669:web:25654684a89b4dceac8904",
  };

  try {
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    await signInAnonymously(getAuth(app));
    const p = (k) => "sutakip/" + k.replace(/[.$#\[\]\/:]/g, "_");

    window.storage = {
      async get(key) {
        const s = await get(ref(db, p(key)));
        return s.exists() ? { key, value: s.val() } : null;
      },
      async set(key, value) {
        await set(ref(db, p(key)), value);
        return { key, value };
      },
      subscribe(key, cb) {
        return onValue(ref(db, p(key)), (s) => cb(s.exists() ? s.val() : null));
      },
    };
    window.__resolveReady(true);
  } catch (e) {
    console.error(e);
    document.getElementById("root").innerHTML =
      '<div style="color:#fda4af;font:16px system-ui;padding:24px;text-align:center">Firebase bağlantısı kurulamadı.<br><br>index.html içindeki firebaseConfig bilgilerini kontrol et.</div>';

</script>

<script type="text/babel" data-type="module">

const DAY_KEY = "sutakip:gun";
const HIST_KEY = "sutakip:gecmis";

const GECIKME_GUN = 7;

const ADMIN_USER = "admin";
const ADMIN_PASS = "burak123";

  set: (k, v) => { try { localStorage.setItem("sukasa_" + k, v); } catch {} },

const DEFAULT_PRODUCTS = [
  { id: "su", name: "Su", price: 10 },
  { id: "buyuksu", name: "Büyük Su", price: 20 },
  { id: "soda", name: "Soda", price: 15 },
  { id: "meyveli", name: "Meyveli Soda", price: 20 },
];

const PAY = {
  nakit: { label: "Nakit", icon: "wallet", cls: "bg-emerald-500 text-emerald-950" },
  iban: { label: "IBAN", icon: "phone", cls: "bg-sky-400 text-sky-950" },
  veresiye: { label: "Veresiye", icon: "book", cls: "bg-amber-400 text-amber-950" },
  ikram: { label: "İkram", icon: "gift", cls: "bg-violet-400 text-violet-950" },
};

const uid = () => (crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.random());
const todayStr = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
};
const prettyDate = (s) => { const [y, m, d] = s.split("-"); return `${d}.${m}.${y}`; };
const tl = (n) => `${(Math.round(n * 100) / 100).toLocaleString("tr-TR")} ₺`;
const clock = (ts) => new Date(ts).toLocaleTimeString("tr-TR", { hour: "2-digit", minute: "2-digit" });

const gunFarki = (ts) => Math.floor((Date.now() - ts) / 86400000);

// Bir kişinin kalan borcu
const bakiye = (p) =>
  (p.debts || []).reduce((a, d) => a + d.amount, 0) - (p.payments || []).reduce((a, x) => a + x.amount, 0);

// Ödemeler en eski borçtan başlayarak düşülür; kapanmamış en eski borcun tarihi
function enEskiAcik(p) {
  let kalan = (p.payments || []).reduce((a, x) => a + x.amount, 0);
  const ds = [...(p.debts || [])].sort((a, b) => a.ts - b.ts);
  for (const d of ds) {
    if (kalan >= d.amount) kalan -= d.amount;
    else return d.ts;
  }
  return null;
}

// Borcu olan kişiler, en gecikmişi başta
function borclular(ledger) {
  return Object.entries(ledger?.people || {})
    .map(([isim, p]) => ({ isim, p, borc: bakiye(p), eski: enEskiAcik(p) }))
    .filter((x) => x.borc > 0.009)
    .map((x) => ({ ...x, gun: x.eski ? gunFarki(x.eski) : 0 }))
    .sort((a, b) => b.gun - a.gun);
}

const parse = (v) => { try { return v ? JSON.parse(v) : null; } catch { return null; } };
async function readDay() { try { const r = await window.storage.get(DAY_KEY); return r ? parse(r.value) : null; } catch { return null; } }
async function readHist() { try { const r = await window.storage.get(HIST_KEY); return parse(r?.value) || []; } catch { return []; } }
async function readLed() { try { const r = await window.storage.get(LED_KEY); return parse(r?.value) || { people: {} }; } catch { return { people: {} }; } }

function App() {
  const [ready, setReady] = useState(false);
  const [authed, setAuthed] = useState(remember.get("auth") === "1");
  const [who, setWho] = useState(remember.get("who"));
  const [day, setDay] = useState(null);
  const [ledger, setLedger] = useState({ people: {} });
  const [loading, setLoading] = useState(true);
  const [busy, setBusy] = useState(false);
  const [tab, setTab] = useState("satis");
  const [sheet, setSheet] = useState(null);
  const [toast, setToast] = useState(null);
  const [hist, setHist] = useState([]);
  const [err, setErr] = useState("");
  const lock = useRef(false);

  useEffect(() => {
    (async () => {
      await window.__ready;
      setReady(true);
      setDay(await readDay());
      setHist(await readHist());
      setLedger(await readLed());
      setLoading(false);
      // canlı senkron: başka telefonda satış girilince anında düşer
      window.storage.subscribe(DAY_KEY, (v) => { if (!lock.current) setDay(parse(v)); });
      window.storage.subscribe(HIST_KEY, (v) => setHist(parse(v) || []));
      window.storage.subscribe(LED_KEY, (v) => { if (!lock.current) setLedger(parse(v) || { people: {} }); });
    })();
  }, []);

  const mutate = useCallback(async (fn) => {
    lock.current = true;
    setBusy(true);
    setErr("");
    try {
      const latest = (await readDay()) || day;
      const next = fn(JSON.parse(JSON.stringify(latest)));
      await window.storage.set(DAY_KEY, JSON.stringify(next));
      setDay(next);
    } catch (e) {
      setErr("Kaydedilemedi. İnternete bakıp tekrar dene.");
    } finally {
      setBusy(false);
      lock.current = false;
    }
  }, [day]);

  const mutateLed = useCallback(async (fn) => {
    lock.current = true;
    setBusy(true);
    setErr("");
    try {
      const latest = await readLed();
      const next = fn(JSON.parse(JSON.stringify(latest)));
      await window.storage.set(LED_KEY, JSON.stringify(next));
      setLedger(next);
    } catch (e) {
      setErr("Veresiye kaydedilemedi. İnternete bakıp tekrar dene.");
    } finally {
      setBusy(false);
      lock.current = false;
    }
  }, []);

  // Satış sil: veresiyeyse defterden de düşer
  const satisSil = useCallback(async (s) => {
    await mutate((d) => ({ ...d, sales: d.sales.filter((x) => x.id !== s.id) }));
    if (s.pay === "veresiye" && s.person) {
      await mutateLed((l) => {
        const kisi = l.people[s.person];
        if (kisi) kisi.debts = (kisi.debts || []).filter((d) => d.id !== s.id);
        return l;
      });
    }
  }, [mutate, mutateLed]);

  if (!ready || loading) return <Screen><p className="text-foam/60">Yükleniyor…</p></Screen>;
  if (!authed) return <LoginScreen onOk={() => { remember.set("auth", "1"); setAuthed(true); }} />;
  if (!who) return <WhoScreen onPick={(n) => { remember.set("who", n); setWho(n); }} />;

  const isToday = day && day.date === todayStr() && !day.closed;

  return (
    <div className="min-h-screen bg-ink text-slate-100 pb-28">
      <Header who={who} onChangeWho={() => setWho("")} busy={busy} />
      {err && <p className="mx-4 mb-2 rounded-lg bg-rose-500/15 px-3 py-2 text-sm text-rose-300">{err}</p>}

      {!isToday ? (
        <OpenDay day={day} hist={hist} onOpen={async (payload) => { await mutate(() => payload); setTab("satis"); }} />
      ) : (
        <>
          {tab === "satis" && (
            <SalesTab day={day} ledger={ledger} onPick={setSheet} mutate={mutate} onDelete={satisSil} who={who}
              onGoBorc={() => setTab("veresiye")} />
          )}
          {tab === "veresiye" && (
            <VeresiyeTab ledger={ledger} mutateLed={mutateLed} mutate={mutate} who={who} />
          )}
          {tab === "gecmis" && <GecmisTab hist={hist} />}
          {tab === "gunsonu" && (
            <CloseTab
              day={day}
              ledger={ledger}
              onClose={async () => {
                const rep = { ...day, closed: true, closedAt: Date.now(), closedBy: who };
                const h = [rep, ...(await readHist())].slice(0, 60);
                await window.storage.set(HIST_KEY, JSON.stringify(h));
                setHist(h);
                await mutate((d) => ({ ...d, closed: true, closedAt: Date.now(), closedBy: who }));
              }}
            />
          )}
          {tab === "ayar" && (
            <SettingsTab day={day} mutate={mutate}
              onLogout={() => { remember.del("auth"); remember.del("who"); setWho(""); setAuthed(false); }} />
          )}
          <TabBar tab={tab} setTab={setTab} borcSayisi={borclular(ledger).filter((b) => b.gun >= GECIKME_GUN).length} />
        </>
      )}

      {toast && (
        <div className="pointer-events-none fixed inset-x-0 top-16 z-40 flex justify-center px-4">
          <div className={`animate-toast flex items-center gap-2 rounded-full px-4 py-2 text-sm font-bold shadow-xl ${toast.cls}`}>
            <I n={toast.icon} className="h-4 w-4" /> {toast.text} kaydedildi
          </div>
        </div>
      )}

      {sheet && (
        <PaySheet
          product={sheet}
          day={day}
          ledger={ledger}
          onClose={() => setSheet(null)}
          onSave={async (entry) => {
            setSheet(null);
            try { navigator.vibrate && navigator.vibrate(12); } catch {}
            setToast({ text: `${entry.label} · ${PAY[entry.pay].label}`, cls: PAY[entry.pay].cls, icon: PAY[entry.pay].icon });
            setTimeout(() => setToast(null), 2000);
            const id = uid();
            const ts = Date.now();
            await mutate((d) => ({ ...d, sales: [...d.sales, { ...entry, by: who, id, ts }] }));
            if (entry.pay === "veresiye" && entry.person) {
              await mutateLed((l) => {
                if (!l.people) l.people = {};
                if (!l.people[entry.person]) l.people[entry.person] = { debts: [], payments: [] };
                const k = l.people[entry.person];
                k.debts = [...(k.debts || []), { id, ts, label: entry.label || "", amount: entry.price, by: who }];
                return l;
              });
            }
          }}
        />
      )}
    </div>
  );
}

// Değer değişince rakamlar yumuşakça sayar
function useCount(target) {
  const [v, setV] = useState(target);
  const ref = useRef(target);
  useEffect(() => {
    const from = ref.current, to = target;
    if (from === to) return;
    const t0 = performance.now(), sure = 420;
    let raf;
    const adim = (t) => {
      const k = Math.min(1, (t - t0) / sure);
      const e = 1 - Math.pow(1 - k, 3);
      setV(from + (to - from) * e);
      if (k < 1) raf = requestAnimationFrame(adim);
      else { ref.current = to; setV(to); }
    };
    raf = requestAnimationFrame(adim);
    return () => cancelAnimationFrame(raf);
  }, [target]);
  return v;
}
const Money = ({ n }) => <span>{tl(Math.round(useCount(n)))}</span>;

function WhoScreen({ onPick }) {

    <Screen>

        <I n="drop" className="mx-auto mb-4 h-10 w-10 text-aqua" />

        <p className="mb-6 text-sm text-slate-400">Adını yaz, satışların yanında görünsün.</p>

function Stepper({ value, onChange }) {
  const n = Number(value) || 0;
  return (
    <div className="flex items-center gap-1">
      <button onClick={() => onChange(String(Math.max(0, n - 1)))} className="rounded-lg bg-line/70 p-2"><I n="minus" className="h-4 w-4" /></button>
      <input inputMode="numeric" value={value} onChange={(e) => onChange(e.target.value.replace(/\D/g, ""))} placeholder="0"
        className="w-14 rounded-lg border border-line bg-ink py-2 text-center font-bold text-white outline-none focus:border-aqua" />
      <button onClick={() => onChange(String(n + 1))} className="rounded-lg bg-line/70 p-2"><I n="plus" className="h-4 w-4" /></button>
    </div>
  );
}

const soldCount = (day, id) => day.sales.filter((s) => s.productId === id).length;

function totals(day) {
  const sum = (f) => day.sales.filter(f).reduce((a, s) => a + s.price, 0);
  const ciro = sum(() => true);
  const nakit = sum((s) => s.pay === "nakit");
  const iban = sum((s) => s.pay === "iban");
  const veresiye = sum((s) => s.pay === "veresiye");
  const ikramlar = day.sales.filter((s) => s.pay === "ikram");
  const ikramAdet = ikramlar.length;
  const ikramDeger = ikramlar.reduce((a, s) => a + (s.listPrice || 0), 0);
  const giderNakit = day.expenses.filter((e) => e.fromCash !== false).reduce((a, e) => a + e.amount, 0);
  const giderHepsi = day.expenses.reduce((a, e) => a + e.amount, 0);
  const col = day.collections || [];
  const tahsilNakit = col.filter((c) => c.pay === "nakit").reduce((a, c) => a + c.amount, 0);
  const tahsilIban = col.filter((c) => c.pay === "iban").reduce((a, c) => a + c.amount, 0);
  const tahsilat = tahsilNakit + tahsilIban;
  return {
    ciro, nakit, iban, veresiye, ikramAdet, ikramDeger, giderNakit, giderHepsi,
    tahsilNakit, tahsilIban, tahsilat,
    kasa: day.startCash + nakit + tahsilNakit - giderNakit,
  };
}

function VeresiyeTab({ ledger, mutateLed, mutate, who }) {
  const [acik, setAcik] = useState(null);
  const [tut, setTut] = useState("");
  const [nasil, setNasil] = useState("nakit");
  const [yeni, setYeni] = useState(false);
  const [nIsim, setNIsim] = useState("");
  const [nTut, setNTut] = useState("");
  const [nNot, setNNot] = useState("");
  const bl = borclular(ledger);
  const toplam = bl.reduce((a, b) => a + b.borc, 0);
  const gec = bl.filter((b) => b.gun >= GECIKME_GUN);
  const kisiler = Object.keys(ledger?.people || {});

  const borcEkle = async () => {
    const isim = nIsim.trim();
    const miktar = Number(nTut) || 0;
    if (!isim || miktar <= 0) return;
    await mutateLed((l) => {
      if (!l.people) l.people = {};
      if (!l.people[isim]) l.people[isim] = { debts: [], payments: [] };
      const k = l.people[isim];
      k.debts = [...(k.debts || []), { id: uid(), ts: Date.now(), label: nNot.trim() || "Serbest kayıt", amount: miktar, by: who, serbest: true }];
      return l;
    });
    try { navigator.vibrate && navigator.vibrate(12); } catch {}
    setNIsim(""); setNTut(""); setNNot(""); setYeni(false);
  };

  const odemeAl = async (isim) => {
    const miktar = Number(tut) || 0;
    if (miktar <= 0) return;
    const ts = Date.now();
    const id = uid();
    await mutateLed((l) => {
      const k = l.people[isim];
      k.payments = [...(k.payments || []), { id, ts, amount: miktar, pay: nasil, by: who }];
      return l;
    });
    // nakit tahsilat kasaya girer
    await mutate((d) => ({ ...d, collections: [...(d.collections || []), { id, ts, person: isim, amount: miktar, pay: nasil, by: who }] }));
    setTut(""); setAcik(null);
  };

  return (
    <div className="px-4 py-4">
      <div className="mb-4 flex items-center gap-2">
        <I n="book" className="h-5 w-5 text-amber-400" />
        <h2 className="text-xl font-black text-white">Veresiye defteri</h2>
      </div>

      <div className="mb-5 grid grid-cols-2 gap-2">
        <Stat label="Toplam alacak" value={tl(toplam)} tone="text-amber-400" />
        <Stat label={`${GECIKME_GUN}+ gün ödemeyen`} value={String(gec.length)} tone={gec.length ? "text-rose-400" : "text-slate-400"} />
      </div>

      {!yeni ? (
        <button onClick={() => setYeni(true)}
          className="press mb-5 w-full rounded-xl border border-dashed border-line py-3 text-sm font-bold text-slate-400">
          + Borç ekle (üyelik, başka bir şey…)
        </button>
      ) : (
        <div className="animate-rise mb-5 space-y-2 rounded-2xl border border-amber-400/30 bg-deep p-3">
          <p className="text-xs font-bold uppercase tracking-wider text-amber-400">Yeni borç</p>
          <input value={nIsim} onChange={(e) => setNIsim(e.target.value)} placeholder="Kime? (isim)"
            className="w-full rounded-lg border border-line bg-ink px-3 py-2.5 font-semibold outline-none focus:border-amber-400" />
          {kisiler.length > 0 && (
            <div className="flex flex-wrap gap-1">
              {kisiler.slice(0, 8).map((n) => (
                <button key={n} onClick={() => setNIsim(n)} className="rounded-full bg-line/70 px-3 py-1 text-xs text-slate-300">{n}</button>
              ))}
            </div>
          )}
          <input value={nNot} onChange={(e) => setNNot(e.target.value)} placeholder="Ne için? (üyelik ücreti, protein tozu…)"
            className="w-full rounded-lg border border-line bg-ink px-3 py-2.5 text-sm outline-none focus:border-amber-400" />
          <div className="flex items-center gap-2">
            <input inputMode="decimal" value={nTut} onChange={(e) => setNTut(e.target.value.replace(",", "."))} placeholder="Tutar"
              className="w-28 rounded-lg border border-line bg-ink px-3 py-2.5 font-num text-xl font-bold text-amber-300 outline-none focus:border-amber-400" />
            <span className="font-num text-xl font-bold text-amber-300">₺</span>
          </div>
          <div className="flex gap-2 pt-1">
            <button onClick={() => { setYeni(false); setNIsim(""); setNTut(""); setNNot(""); }}
              className="press rounded-xl border border-line/50 px-4 py-3 text-sm font-bold text-slate-400">Vazgeç</button>
            <button onClick={borcEkle} disabled={!nIsim.trim() || !(Number(nTut) > 0)}
              className="press flex-1 rounded-xl bg-amber-400 py-3 font-black text-amber-950 disabled:bg-line/70 disabled:text-slate-500">

            </button>
          </div>
        </div>

        <div className="rounded-2xl border border-dashed border-line/50 p-8 text-center">

              </button>

              {open && (
                <div className="animate-rise border-t border-line/50 p-3">
                  <p className="mb-2 text-[10px] font-bold uppercase tracking-wider text-slate-500">Hareketler</p>
                  <div className="mb-3 max-h-48 space-y-1 overflow-y-auto">
                    {[...(p.debts || []).map((d) => ({ ...d, tip: "borc" })), ...(p.payments || []).map((x) => ({ ...x, tip: "odeme" }))]
                      .sort((a, b) => b.ts - a.ts)
                      .map((h) => (
                        <div key={h.id} className="flex items-center gap-2 text-xs">
                          <span className="text-slate-500">{new Date(h.ts).toLocaleDateString("tr-TR")}</span>
                          <span className="min-w-0 flex-1 truncate text-slate-400">
                            {h.tip === "borc" ? h.label || "Satış" : `Ödeme (${PAY[h.pay]?.label || ""})`}
                            {h.serbest && <span className="ml-1 text-[9px] uppercase tracking-wider text-slate-500">elle</span>}
                          </span>
                          <span className={`font-bold ${h.tip === "borc" ? "text-amber-300" : "text-emerald-400"}`}>
                            {h.tip === "borc" ? "+" : "−"}{tl(h.amount)}
                          </span>
                        </div>
                      ))}
                  </div>

                  <p className="mb-2 text-[10px] font-bold uppercase tracking-wider text-emerald-300">Ödeme al</p>
                  <div className="flex gap-2">
                    <input inputMode="decimal" value={tut} onChange={(e) => setTut(e.target.value.replace(",", "."))} placeholder="Tutar"
                      className="w-24 rounded-lg border border-line bg-ink px-3 py-2 font-bold outline-none focus:border-emerald-400" />
                    <button onClick={() => setTut(String(borc))} className="rounded-lg bg-line/70 px-3 text-xs font-bold text-slate-300">Hepsi</button>
                    <div className="flex flex-1 gap-1">
                      {["nakit", "iban"].map((k) => (
                        <button key={k} onClick={() => setNasil(k)}
                          className={`flex-1 rounded-lg text-xs font-black ${nasil === k ? PAY[k].cls : "bg-line/70 text-slate-400"}`}>
                          {PAY[k].label}
                        </button>
                      ))}
                    </div>
                  </div>
                  <button onClick={() => odemeAl(isim)} disabled={!tut || Number(tut) <= 0}
                    className="mt-2 w-full rounded-xl bg-emerald-400 py-3 font-black text-emerald-950 disabled:bg-line/70 disabled:text-slate-500">
                    Ödemeyi kaydet
                  </button>
                  <p className="mt-2 text-center text-[10px] text-slate-500/80">Nakit ödeme kasaya eklenir.</p>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {Object.keys(ledger?.people || {}).length > bl.length && (
        <div className="mt-8">
          <p className="mb-2 text-xs font-bold uppercase tracking-wider text-slate-500">Borcu kapananlar</p>
          {Object.entries(ledger.people).filter(([n]) => !bl.some((b) => b.isim === n)).map(([n]) => (
            <div key={n} className="flex justify-between border-b border-line/50 py-2 text-sm">
              <span className="text-slate-400">{n}</span>
              <span className="font-bold text-emerald-400">Ödendi</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function GecmisTab({ hist }) {
  const [acik, setAcik] = useState(null);
  return (
    <div className="px-4 py-4">
      <div className="mb-4 flex items-center gap-2">
        <I n="clock" className="h-5 w-5 text-aqua" />
        <h2 className="text-xl font-black text-white">Geçmiş satışlar</h2>
      </div>

      {hist.length === 0 && (
        <div className="rounded-2xl border border-dashed border-line/50 p-8 text-center">
          <p className="font-bold text-slate-400">Henüz kapatılmış gün yok.</p>
          <p className="mt-1 text-sm text-slate-500/80">Gün sonunda "Günü kapat" dedikçe buraya düşer.</p>
        </div>
      )}

      <div className="space-y-2">
        {hist.map((h) => {
          const t = totals(h);
          const open = acik === h.date + h.closedAt;
          return (
            <div key={h.date + h.closedAt} className="overflow-hidden rounded-2xl bg-deep">
              <button onClick={() => setAcik(open ? null : h.date + h.closedAt)} className="flex w-full items-center gap-3 p-3 text-left">
                <div className="min-w-0 flex-1">
                  <p className="font-black text-white">{prettyDate(h.date)}</p>
                  <p className="mt-0.5 text-xs text-slate-500">{h.sales.length} hareket · kasa {tl(t.kasa)}</p>
                </div>
                <span className="text-lg font-black text-aqua">{tl(t.ciro)}</span>
                <I n="arrow" className={`h-4 w-4 text-slate-500/80 transition ${open ? "rotate-90" : ""}`} />
              </button>

              {open && (
                <div className="border-t border-line/50 p-3">
                  <div className="mb-3 space-y-1 text-xs">
                    <Row k="Nakit" v={tl(t.nakit)} />
                    <Row k="IBAN" v={tl(t.iban)} />
                    <Row k="Veresiye" v={tl(t.veresiye)} tone="text-amber-400" />
                    <Row k={`İkram (${t.ikramAdet})`} v={tl(t.ikramDeger)} tone="text-violet-300" />
                    <Row k="Harcama" v={`-${tl(t.giderHepsi)}`} tone="text-rose-400" />
                    <Row k="Net kazanç" v={tl(t.ciro - t.giderHepsi)} bold tone="text-emerald-400" />
                  </div>
                  <p className="mb-1 text-[10px] font-bold uppercase tracking-wider text-slate-500">Ürünler</p>
                  {h.products.map((p) => {
                    const adet = h.sales.filter((s) => s.productId === p.id).length;
                    if (!adet) return null;
                    const tutar = h.sales.filter((s) => s.productId === p.id).reduce((a, s) => a + s.price, 0);
                    return (
                      <div key={p.id} className="flex justify-between py-1 text-xs">
                        <span className="text-slate-400">{p.name} × {adet}</span>
                        <span className="font-bold text-aqua">{tl(tutar)}</span>
                      </div>
                    );
                  })}
                  <p className="mb-1 mt-3 text-[10px] font-bold uppercase tracking-wider text-slate-500">Tüm hareketler</p>
                  <div className="max-h-64 space-y-1 overflow-y-auto">
                    {[...h.sales].reverse().map((s) => (
                      <div key={s.id} className="flex items-center gap-2 text-xs">
                        <span className="text-slate-500/80">{clock(s.ts)}</span>
                        <span className="text-slate-300">{h.products.find((p) => p.id === s.productId)?.name}</span>
                        <span className="min-w-0 flex-1 truncate text-slate-500">{s.person || PAY[s.pay]?.label}</span>
                        <span className={`font-bold ${s.pay === "ikram" ? "text-violet-300" : "text-aqua"}`}>
                          {s.pay === "ikram" ? "İkram" : tl(s.price)}
                        </span>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function CloseTab({ day, ledger, onClose }) {
  const t = totals(day);
  return (
    <div className="px-4 py-4">
      <div className="mb-4 flex items-center gap-2">
        <I n="moon" className="h-5 w-5 text-aqua" />
        <h2 className="text-xl font-black text-white">Gün sonu — {prettyDate(day.date)}</h2>
      </div>
      <div className="rounded-2xl bg-gradient-to-b from-aqua/20 to-transparent p-4">
        <p className="text-xs font-bold uppercase tracking-wider text-aqua">Kasada olması gereken</p>
        <p className="font-num text-5xl font-bold leading-none text-white"><Money n={t.kasa} /></p>
        <p className="mt-1 text-xs text-slate-400">
          Sabahki {tl(day.startCash)} + nakit {tl(t.nakit)}
          {t.tahsilNakit > 0 && ` + tahsilat ${tl(t.tahsilNakit)}`} − harcama {tl(t.giderNakit)}
        </p>
      </div>
      <div className="mt-4 space-y-1 rounded-2xl bg-deep p-4 text-sm">
        <Row k="Toplam ciro" v={tl(t.ciro)} bold />
        <Row k="Nakit" v={tl(t.nakit)} />
        <Row k="IBAN'a gelen" v={tl(t.iban)} />
        <Row k="Veresiye (tahsil edilmedi)" v={tl(t.veresiye)} tone="text-amber-400" />
        <Row k={`İkram — ${t.ikramAdet} adet`} v={tl(t.ikramDeger)} tone="text-violet-300" />
        <Row k="Ekstra harcama" v={`-${tl(t.giderHepsi)}`} tone="text-rose-400" />
        {t.tahsilat > 0 && <Row k="Tahsil edilen eski veresiye" v={tl(t.tahsilat)} tone="text-emerald-400" />}
        <div className="my-2 border-t border-line/50" />
        <Row k="Günün net kazancı" v={tl(t.ciro - t.giderHepsi)} bold tone="text-emerald-400" />
      </div>
      <p className="mb-2 mt-5 text-xs font-bold uppercase tracking-wider text-aqua">Hangi üründen ne kazandık</p>
      <div className="space-y-2">
        {day.products.map((p) => {
          const cikan = soldCount(day, p.id);
          const ikram = day.sales.filter((s) => s.productId === p.id && s.pay === "ikram").length;
          const adet = cikan - ikram;
          const tutar = day.sales.filter((s) => s.productId === p.id).reduce((a, s) => a + s.price, 0);
          const kalan = (day.startStock[p.id] || 0) - cikan;
          return (
            <div key={p.id} className="rounded-xl bg-deep p-3">
              <div className="flex items-baseline gap-2">
                <span className="font-bold text-white">{p.name}</span>
                <span className="text-xs text-slate-500">
                  {adet} satıldı{ikram > 0 && <span className="text-violet-300"> · {ikram} ikram</span>} · dolapta {kalan} kaldı
                </span>
                <span className="ml-auto font-black text-aqua">{tl(tutar)}</span>
              </div>
              <div className="mt-2 h-1.5 overflow-hidden rounded-full bg-line/70">
                <div className="h-full rounded-full bg-aqua transition-all duration-700 ease-out" style={{ width: `${t.ciro ? (tutar / t.ciro) * 100 : 0}%` }} />
              </div>
            </div>
          );
        })}
      </div>
      {borclular(ledger).length > 0 && (
        <div className="mt-5 rounded-2xl border border-amber-400/30 bg-amber-400/5 p-3">
          <p className="text-xs font-bold uppercase tracking-wider text-amber-400">Toplam açık alacak</p>
          <p className="text-2xl font-black text-amber-300">{tl(borclular(ledger).reduce((a, b) => a + b.borc, 0))}</p>
          <p className="mt-1 text-xs text-slate-400">
            {borclular(ledger).length} kişi
            {borclular(ledger).filter((b) => b.gun >= GECIKME_GUN).length > 0 &&
              ` · ${borclular(ledger).filter((b) => b.gun >= GECIKME_GUN).length} tanesi ${GECIKME_GUN}+ gündür ödemiyor`}
          </p>
        </div>
      )}

      {t.veresiye > 0 && (
        <>
          <p className="mb-2 mt-5 text-xs font-bold uppercase tracking-wider text-amber-400">Bugün verilen veresiye</p>
          <div className="space-y-1">
            {Object.entries(day.sales.filter((s) => s.pay === "veresiye").reduce((a, s) => ({ ...a, [s.person]: (a[s.person] || 0) + s.price }), {})).map(([n, v]) => (
              <div key={n} className="flex justify-between rounded-lg bg-amber-400/10 px-3 py-2 text-sm">
                <span>{n}</span><span className="font-black text-amber-300">{tl(v)}</span>
              </div>
            ))}
          </div>
        </>
      )}
      {t.ikramAdet > 0 && (
        <>
          <p className="mb-2 mt-5 text-xs font-bold uppercase tracking-wider text-violet-300">İkramlar</p>
          <div className="space-y-1">
            {day.sales.filter((s) => s.pay === "ikram").map((s) => (
              <div key={s.id} className="flex items-center gap-2 rounded-lg bg-violet-400/10 px-3 py-2 text-sm">
                <span>{day.products.find((p) => p.id === s.productId)?.name}</span>
                <span className="truncate text-slate-400">{s.person || "—"}</span>
                <span className="ml-auto text-[10px] text-slate-500">{clock(s.ts)} · {s.by}</span>
                <span className="font-bold text-violet-300">{tl(s.listPrice || 0)}</span>
              </div>
            ))}
          </div>
        </>
      )}
      <button onClick={onClose} className="mt-6 w-full rounded-2xl border border-line py-4 font-black text-slate-300">Günü kapat ve kaydet</button>
    </div>
  );
}

const Row = ({ k, v, bold, tone = "text-slate-200" }) => (
  <div className="flex justify-between">
    <span className="text-slate-400">{k}</span>
    <span className={`${bold ? "font-black" : "font-semibold"} ${tone}`}>{v}</span>
  </div>
);

function SettingsTab({ day, mutate, onLogout }) {
  const [draft, setDraft] = useState(day.products.map((p) => ({ ...p, price: String(p.price) })));
  const [stock, setStock] = useState(Object.fromEntries(day.products.map((p) => [p.id, String(day.startStock[p.id] ?? 0)])));
  const [cash, setCash] = useState(String(day.startCash));
  const [saved, setSaved] = useState(false);
  const [msg, setMsg] = useState("");

  const edit = (i, k, v) => setDraft((d) => d.map((p, j) => (j === i ? { ...p, [k]: v } : p)));

  const sil = (i) => {
    const p = draft[i];
    if (day.sales.some((s) => s.productId === p.id)) {
      setMsg(`${p.name} bugün satılmış. Silmek için önce o satışları geri al.`);
      return;
    }
    if (!confirm(`${p.name} silinsin mi?`)) return;
    setDraft((d) => d.filter((_, j) => j !== i));
    setMsg("");
  };

  const ekle = () => setDraft((d) => [...d, { id: uid(), name: "", price: "0" }]);

  const kaydet = async () => {
    const temiz = draft.filter((p) => p.name.trim()).map((p) => ({ id: p.id, name: p.name.trim(), price: Number(p.price) || 0 }));
    if (!temiz.length) { setMsg("En az bir ürün olmalı."); return; }
    await mutate((d) => ({
      ...d,
      products: temiz,
      startStock: Object.fromEntries(temiz.map((p) => [p.id, Number(stock[p.id]) || 0])),
      startCash: Number(cash) || 0,
    }));
    setMsg("");
    setSaved(true);
    setTimeout(() => setSaved(false), 2000);
  };

  return (
    <div className="px-4 py-4">
      <h2 className="mb-1 text-xl font-black text-white">Ayarlar</h2>
      <p className="mb-4 text-sm text-slate-500">Değiştir, sonra aşağıdan Kaydet'e bas.</p>

      <p className="mb-2 text-xs font-bold uppercase tracking-wider text-aqua">Ürünler ve fiyatlar</p>
      <div className="space-y-2">
        {draft.map((p, i) => (
          <div key={p.id} className="flex items-center gap-2 rounded-xl bg-deep p-3">
            <input value={p.name} onChange={(e) => edit(i, "name", e.target.value)} placeholder="Ürün adı"
              className="min-w-0 flex-1 rounded-lg border border-transparent bg-ink px-2 py-1.5 font-semibold text-white outline-none focus:border-aqua" />
            <input inputMode="decimal" value={p.price}
              onChange={(e) => edit(i, "price", e.target.value.replace(",", "."))}
              className="w-16 rounded-lg border border-line bg-ink px-2 py-1.5 text-right font-black text-aqua outline-none focus:border-aqua" />
            <span className="font-black text-aqua">₺</span>
            <button onClick={() => sil(i)} className="rounded-lg bg-line/70 p-2 text-rose-400"><I n="x" className="h-4 w-4" /></button>
          </div>
        ))}
      </div>
      <button onClick={ekle} className="mt-2 w-full rounded-xl border border-dashed border-line py-3 text-sm font-bold text-slate-400">+ Ürün ekle</button>

      <p className="mb-2 mt-6 text-xs font-bold uppercase tracking-wider text-aqua">Sabah dolaptaki adet</p>
      <div className="space-y-2">
        {draft.map((p) => (
          <div key={p.id} className="flex items-center gap-3 rounded-xl bg-deep p-3">
            <span className="min-w-0 flex-1 truncate text-sm font-semibold">{p.name || "—"}</span>
            <Stepper value={stock[p.id] ?? "0"} onChange={(v) => setStock((s) => ({ ...s, [p.id]: v }))} />
          </div>
        ))}
      </div>

      <div className="mt-4 flex items-center gap-3 rounded-xl bg-deep p-3">
        <span className="flex-1 text-sm font-semibold">Sabah kasadaki para</span>
        <input inputMode="decimal" value={cash} onChange={(e) => setCash(e.target.value.replace(",", "."))}
          className="w-24 rounded-lg border border-line bg-ink px-2 py-1.5 text-right font-black text-aqua outline-none focus:border-aqua" />
        <span className="font-black text-aqua">₺</span>
      </div>

      {msg && <p className="mt-3 rounded-lg bg-rose-500/15 px-3 py-2 text-sm text-rose-300">{msg}</p>}

      <button onClick={kaydet}
        className={`mt-4 flex w-full items-center justify-center gap-2 rounded-2xl py-4 text-lg font-black transition ${saved ? "bg-emerald-400 text-emerald-950" : "bg-aqua text-ink"}`}>
        <I n="check" className="h-5 w-5" /> {saved ? "Kaydedildi" : "Kaydet"}
      </button>

      <button onClick={onLogout} className="mt-8 w-full rounded-2xl border border-line/50 py-3 text-sm font-bold text-slate-500">
        Çıkış yap
      </button>
    </div>
  );
}

function TabBar({ tab, setTab, borcSayisi }) {
  const items = [
    { k: "satis", label: "Satış", icon: "drop" },
    { k: "veresiye", label: "Veresiye", icon: "book", badge: borcSayisi },
    { k: "gecmis", label: "Geçmiş", icon: "clock" },
    { k: "gunsonu", label: "Gün sonu", icon: "moon" },
    { k: "ayar", label: "Ayarlar", icon: "gear" },
  ];
  return (
    <div className="fixed bottom-0 left-0 right-0 z-20 flex border-t border-line/50 bg-ink/90 pb-[env(safe-area-inset-bottom)] backdrop-blur">
      {items.map(({ k, label, icon, badge }) => (
        <button key={k} onClick={() => setTab(k)} className={`press relative flex flex-1 flex-col items-center gap-1 py-3 transition-colors ${tab === k ? "text-aqua" : "text-slate-500"}`}>
          {tab === k && <span className="absolute inset-x-3 top-0 h-0.5 animate-fade rounded-full bg-aqua" />}
          <I n={icon} className={`h-5 w-5 transition-transform duration-300 ${tab === k ? "scale-110" : ""}`} />
          {badge > 0 && (
            <span className="absolute right-[20%] top-1.5 flex h-4 min-w-4 animate-throb items-center justify-center rounded-full bg-rose-500 px-1 text-[10px] font-black text-white">
              {badge}
            </span>
          )}
          <span className="text-[10px] font-bold">{label}</span>
        </button>
      ))}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
