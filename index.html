const gunFarki = (ts) => Math.floor((Date.now() - ts) / 86400000);

// Bir kişinin kalan borcu
const bakiye = (p) =>
  (p.debts || []).reduce((a, d) => a + d.amount, 0) - (p.payments || []).reduce((a, x) => a + x.amount, 0);

// Ödemeler en eski borçtan başlayarak düşülür; kapanmamış en eski borcun tarihi
function enEskiAcik(p) {
  let kalan = (p.payments || []).reduce((a, x) => a + x.amount, 0);
  const ds = [...(p.debts || [])].sort((a, b) => a.ts - b.ts);
  for (const d of ds) {
    if (kalan >= d.amount) kalan -= d.amount;
    else return d.ts;
  }
  return null;
}

// "Ahmet", "ahmet ", "AHMET" -> ayni anahtar
const normIsim = (n) => (n || "").toLocaleLowerCase("tr").replace(/\s+/g, " ").trim();

// Ayni kisi olabilecek isim gruplari
function benzerGruplar(ledger) {
  const g = {};
  Object.keys(ledger?.people || {}).forEach((n) => {
    const k = normIsim(n);
    (g[k] = g[k] || []).push(n);
  });
  return Object.values(g).filter((a) => a.length > 1);
}

// Borcu olan kişiler, en gecikmişi başta
function borclular(ledger) {
  return Object.entries(ledger?.people || {})
    .map(([isim, p]) => ({ isim, p, borc: bakiye(p), eski: enEskiAcik(p) }))
    .filter((x) => x.borc > 0.009)
    .map((x) => ({ ...x, gun: x.eski ? gunFarki(x.eski) : 0 }))
    .sort((a, b) => b.gun - a.gun);
}

const parse = (v) => { try { return v ? JSON.parse(v) : null; } catch { return null; } };
async function readDay() { try { const r = await window.storage.get(DAY_KEY); return r ? parse(r.value) : null; } catch { return null; } }
async function readHist() { try { const r = await window.storage.get(HIST_KEY); return parse(r?.value) || []; } catch { return []; } }
async function readLed() { try { const r = await window.storage.get(LED_KEY); return parse(r?.value) || { people: {} }; } catch { return { people: {} }; } }

function App() {
  const [ready, setReady] = useState(false);
  const [authed, setAuthed] = useState(remember.get("auth") === "1");
  const [who, setWho] = useState(remember.get("who"));
  const [day, setDay] = useState(null);
  const [ledger, setLedger] = useState({ people: {} });
  const [loading, setLoading] = useState(true);
  const [busy, setBusy] = useState(false);
  const [tab, setTab] = useState("satis");
  const [sheet, setSheet] = useState(null);
  const [toast, setToast] = useState(null);
  const [hist, setHist] = useState([]);
  const [err, setErr] = useState("");
  const lock = useRef(false);

  useEffect(() => {
    (async () => {
      await window.__ready;
      setReady(true);
      setDay(await readDay());
      setHist(await readHist());
      setLedger(await readLed());
      setLoading(false);
      // canlı senkron: başka telefonda satış girilince anında düşer
      window.storage.subscribe(DAY_KEY, (v) => { if (!lock.current) setDay(parse(v)); });
      window.storage.subscribe(HIST_KEY, (v) => setHist(parse(v) || []));
      window.storage.subscribe(LED_KEY, (v) => { if (!lock.current) setLedger(parse(v) || { people: {} }); });
    })();
  }, []);

  const mutate = useCallback(async (fn) => {
    lock.current = true;
    setBusy(true);
    setErr("");
    try {
      const latest = (await readDay()) || day;
      const next = fn(JSON.parse(JSON.stringify(latest)));
      await window.storage.set(DAY_KEY, JSON.stringify(next));
      setDay(next);
    } catch (e) {
      setErr("Kaydedilemedi. İnternete bakıp tekrar dene.");
    } finally {
      setBusy(false);
      lock.current = false;
    }
  }, [day]);

  const mutateLed = useCallback(async (fn) => {
    lock.current = true;
    setBusy(true);
    setErr("");
    try {
      const latest = await readLed();
      const next = fn(JSON.parse(JSON.stringify(latest)));
      await window.storage.set(LED_KEY, JSON.stringify(next));
      setLedger(next);
    } catch (e) {
      setErr("Veresiye kaydedilemedi. İnternete bakıp tekrar dene.");
    } finally {
      setBusy(false);
      lock.current = false;
    }
  }, []);

  // Defter değişince gecikmişleri kontrol et
  useEffect(() => {
    const gec = borclular(ledger).filter((b) => b.gun >= GECIKME_GUN);
    if (gec.length) bildirimGonder(gec);
  }, [ledger]);

  // Satış sil: veresiyeyse defterden de düşer
  const satisSil = useCallback(async (s) => {
    await mutate((d) => ({ ...d, sales: d.sales.filter((x) => x.id !== s.id) }));
    if (s.pay === "veresiye" && s.person) {
      await mutateLed((l) => {
        const kisi = l.people[s.person];
        if (kisi) kisi.debts = (kisi.debts || []).filter((d) => d.id !== s.id);
        return l;
      });
    }
  }, [mutate, mutateLed]);

  if (!ready || loading) return <Screen><p className="text-foam/60">Yükleniyor…</p></Screen>;
  if (!authed) return <LoginScreen onOk={() => { remember.set("auth", "1"); setAuthed(true); }} />;
  if (!who) return <WhoScreen onPick={(n) => { remember.set("who", n); setWho(n); }} />;

  const isToday = day && day.date === todayStr() && !day.closed;

  return (
    <div className="ekran min-h-screen bg-ink text-slate-100 pb-28">
      <Header who={who} onChangeWho={() => setWho("")} busy={busy} />
      {err && <p className="mx-4 mb-2 rounded-lg bg-rose-500/15 px-3 py-2 text-sm text-rose-300">{err}</p>}

      {!isToday ? (
        <OpenDay day={day} hist={hist} onOpen={async (payload) => { await mutate(() => payload); setTab("satis"); }} />
      ) : (
        <>
          {tab === "satis" && (
            <SalesTab day={day} ledger={ledger} onPick={setSheet} mutate={mutate} onDelete={satisSil} who={who}
              onGoBorc={() => setTab("veresiye")} />
          )}
          {tab === "veresiye" && (
            <VeresiyeTab ledger={ledger} mutateLed={mutateLed} mutate={mutate} who={who} />
          )}
          {tab === "gecmis" && <GecmisTab hist={hist} />}
          {tab === "gunsonu" && (
            <CloseTab
              day={day}
              ledger={ledger}
              hist={hist}
              onClose={async () => {
                const rep = { ...day, closed: true, closedAt: Date.now(), closedBy: who };
                const h = [rep, ...(await readHist())].slice(0, 60);
                await window.storage.set(HIST_KEY, JSON.stringify(h));
                setHist(h);
                await mutate((d) => ({ ...d, closed: true, closedAt: Date.now(), closedBy: who }));
              }}
            />
          )}
          {tab === "ayar" && (
            <SettingsTab day={day} mutate={mutate}
              onLogout={() => { remember.del("auth"); remember.del("who"); setWho(""); setAuthed(false); }} />
          )}
          <TabBar tab={tab} setTab={setTab} borcSayisi={borclular(ledger).filter((b) => b.gun >= GECIKME_GUN).length} />
        </>
      )}

      {isToday && <PrintRapor day={day} ledger={ledger} who={who} />}

      {toast && (
        <div className="pointer-events-none fixed inset-x-0 top-16 z-40 flex justify-center px-4">
          <div className={`animate-toast flex items-center gap-2 rounded-full px-4 py-2 text-sm font-bold shadow-xl ${toast.cls}`}>
            <I n={toast.icon} className="h-4 w-4" /> {toast.text} kaydedildi
          </div>
        </div>
      )}

      {sheet && (
        <PaySheet
          product={sheet}
          day={day}
          ledger={ledger}
          onClose={() => setSheet(null)}
          onSave={async (entry) => {
            setSheet(null);
            try { navigator.vibrate && navigator.vibrate(12); } catch {}
            setToast({ text: `${entry.label} · ${PAY[entry.pay].label}`, cls: PAY[entry.pay].cls, icon: PAY[entry.pay].icon });
            setTimeout(() => setToast(null), 2000);
            const id = uid();
            const ts = Date.now();
            await mutate((d) => ({ ...d, sales: [...d.sales, { ...entry, by: who, id, ts }] }));
            if (entry.pay === "veresiye" && entry.person) {
              await mutateLed((l) => {
                if (!l.people) l.people = {};
                if (!l.people[entry.person]) l.people[entry.person] = { debts: [], payments: [] };
                const k = l.people[entry.person];
                k.debts = [...(k.debts || []), { id, ts, label: entry.label || "", amount: entry.price, by: who }];
                return l;
              });
            }
          }}
        />
      )}
    </div>
  );
}

// Değer değişince rakamlar yumuşakça sayar
function useCount(target) {
  const [v, setV] = useState(target);
  const ref = useRef(target);
  useEffect(() => {
    const from = ref.current, to = target;
    if (from === to) return;
    const t0 = performance.now(), sure = 420;
    let raf;
    const adim = (t) => {
      const k = Math.min(1, (t - t0) / sure);
      const e = 1 - Math.pow(1 - k, 3);
      setV(from + (to - from) * e);
      if (k < 1) raf = requestAnimationFrame(adim);
      else { ref.current = to; setV(to); }
    };
    raf = requestAnimationFrame(adim);
    return () => cancelAnimationFrame(raf);
  }, [target]);
  return v;
}
const Money = ({ n }) => <span>{tl(Math.round(useCount(n)))}</span>;

// Gecikmiş borç varsa günde bir kez telefon bildirimi gönderir
function bildirimGonder(gecikenler) {
  if (!("Notification" in window) || Notification.permission !== "granted") return;
  if (remember.get("bildirim_gun") === todayStr()) return;
  remember.set("bildirim_gun", todayStr());
  const isimler = gecikenler.slice(0, 4).map((g) => g.isim).join(", ");
  try {
    new Notification("Ödenmeyen veresiye var", {
      body: `${gecikenler.length} kişi ${GECIKME_GUN}+ gündür ödemedi: ${isimler}${gecikenler.length > 4 ? "…" : ""}`,
      icon: "icon.png",
      tag: "veresiye",
    });
  } catch {}
}

        <I n="sun" className="h-5 w-5 text-amber-400" />

      </div>
      {day?.closed && day.date === todayStr() && (

          <div key={p.id} className="flex items-center gap-3 rounded-xl bg-deep p-3">
            <span className="flex-1 font-semibold">{p.name}</span>

              <span className="text-slate-400">{prettyDate(h.date)}</span>

function Stepper({ value, onChange }) {
  const n = Number(value) || 0;
  return (
    <div className="flex items-center gap-1">
      <button onClick={() => onChange(String(Math.max(0, n - 1)))} className="rounded-lg bg-line/70 p-2"><I n="minus" className="h-4 w-4" /></button>
      <input inputMode="numeric" value={value} onChange={(e) => onChange(e.target.value.replace(/\D/g, ""))} placeholder="0"
        className="w-14 rounded-lg border border-line bg-ink py-2 text-center font-bold text-white outline-none focus:border-aqua" />
      <button onClick={() => onChange(String(n + 1))} className="rounded-lg bg-line/70 p-2"><I n="plus" className="h-4 w-4" /></button>
    </div>
  );
}

const soldCount = (day, id) => day.sales.filter((s) => s.productId === id).length;

function totals(day) {
  const sum = (f) => day.sales.filter(f).reduce((a, s) => a + s.price, 0);
  const ciro = sum(() => true);
  const nakit = sum((s) => s.pay === "nakit");
  const iban = sum((s) => s.pay === "iban");
  const veresiye = sum((s) => s.pay === "veresiye");
  const ikramlar = day.sales.filter((s) => s.pay === "ikram");
  const ikramAdet = ikramlar.length;
  const ikramDeger = ikramlar.reduce((a, s) => a + (s.listPrice || 0), 0);
  const giderNakit = day.expenses.filter((e) => e.fromCash !== false).reduce((a, e) => a + e.amount, 0);
  const giderHepsi = day.expenses.reduce((a, e) => a + e.amount, 0);
  const col = day.collections || [];
  const tahsilNakit = col.filter((c) => c.pay === "nakit").reduce((a, c) => a + c.amount, 0);
  const tahsilIban = col.filter((c) => c.pay === "iban").reduce((a, c) => a + c.amount, 0);
  const tahsilat = tahsilNakit + tahsilIban;
  return {
    ciro, nakit, iban, veresiye, ikramAdet, ikramDeger, giderNakit, giderHepsi,
    tahsilNakit, tahsilIban, tahsilat,
    kasa: day.startCash + nakit + tahsilNakit - giderNakit,
  };
}

// Kim ne kadar satmış / harcamış / tahsil etmiş
function calisanlar(day) {
  const m = {};
  const g = (n) => (m[n] = m[n] || { isim: n || "—", adet: 0, ciro: 0, nakit: 0, iban: 0, veresiye: 0, ikram: 0, gider: 0, tahsil: 0 });
  (day.sales || []).forEach((s) => {
    const x = g(s.by);
    if (s.pay === "ikram") { x.ikram += 1; return; }
    x.adet += 1; x.ciro += s.price;
    if (x[s.pay] !== undefined) x[s.pay] += s.price;
  });
  (day.expenses || []).forEach((e) => { g(e.by).gider += e.amount; });
  (day.collections || []).forEach((c) => { g(c.by).tahsil += c.amount; });
  return Object.values(m).sort((a, b) => b.ciro - a.ciro);
}

function CalisanKirilim({ day }) {
  const list = calisanlar(day);
  const enBuyuk = Math.max(1, ...list.map((c) => c.ciro));
  if (!list.length) return null;
  return (
    <div className="space-y-2">
      {list.map((c, i) => (
        <div key={c.isim} style={{ animationDelay: `${i * 40}ms` }} className="animate-rise rounded-xl border border-line/40 bg-deep p-3">
          <div className="flex items-baseline gap-2">
            <span className="font-black text-white">{c.isim}</span>
            <span className="text-xs text-slate-500">{c.adet} satış{c.ikram > 0 && ` · ${c.ikram} ikram`}</span>
            <span className="ml-auto font-num text-xl font-bold text-aqua">{tl(c.ciro)}</span>
          </div>
          <div className="mt-2 h-1.5 overflow-hidden rounded-full bg-line/70">
            <div className="h-full rounded-full bg-aqua transition-all duration-700 ease-out" style={{ width: `${(c.ciro / enBuyuk) * 100}%` }} />
          </div>
          <div className="mt-2 flex flex-wrap gap-x-3 gap-y-1 text-[11px]">
            <span className="text-emerald-400">Nakit {tl(c.nakit)}</span>
            <span className="text-sky-400">IBAN {tl(c.iban)}</span>
            {c.veresiye > 0 && <span className="text-amber-400">Veresiye {tl(c.veresiye)}</span>}
            {c.tahsil > 0 && <span className="text-emerald-300">Tahsilat {tl(c.tahsil)}</span>}
            {c.gider > 0 && <span className="text-rose-400">Harcama {tl(c.gider)}</span>}
          </div>
        </div>
      ))}
    </div>
  );
}

          <span className="min-w-0 flex-1 text-sm font-semibold leading-tight">

        <Stat label="Ciro" n={t.ciro} tone="text-aqua" delay={40} />
        <Stat label="Veresiye" n={t.veresiye} tone="text-amber-400" delay={80} />
        <Stat label={`İkram (${t.ikramAdet} adet)`} n={t.ikramDeger} tone="text-violet-300" delay={120} />
      </div>
      <p className="mb-2 text-xs font-bold uppercase tracking-wider text-aqua">Satış yap — ürüne bas</p>

        <p className="text-xs font-bold uppercase tracking-wider text-slate-500">Bugünkü satışlar</p>
        <span className="font-num text-sm font-bold text-slate-400">{day.sales.length} kayıt</span>

        {son.map((s, i) => {

}

    <div className="animate-fade fixed inset-0 z-30 flex items-end bg-black/70 backdrop-blur-sm" onClick={onClose}>

  );

function VeresiyeTab({ ledger, mutateLed, mutate, who }) {
  const [acik, setAcik] = useState(null);
  const [ara, setAra] = useState("");
  const [tut, setTut] = useState("");
  const [nasil, setNasil] = useState("nakit");
  const [yeni, setYeni] = useState(false);
  const [nIsim, setNIsim] = useState("");
  const [nTut, setNTut] = useState("");
  const [nNot, setNNot] = useState("");
  const [duzen, setDuzen] = useState(null);      // düzenlenen borç kaydı
  const [birlesGoster, setBirlesGoster] = useState(null); // birleştirme listesi açık olan kişi

  const bl = borclular(ledger);
  const toplam = bl.reduce((a, b) => a + b.borc, 0);
  const gec = bl.filter((b) => b.gun >= GECIKME_GUN);
  const kisiler = Object.keys(ledger?.people || {});
  const gruplar = benzerGruplar(ledger);
  const suz = (isim) => !ara.trim() || normIsim(isim).includes(normIsim(ara));
  const liste = bl.filter((b) => suz(b.isim));

  const borcEkle = async () => {
    const isim = nIsim.trim();
    const miktar = Number(nTut) || 0;
    if (!isim || miktar <= 0) return;
    await mutateLed((l) => {
      if (!l.people) l.people = {};
      if (!l.people[isim]) l.people[isim] = { debts: [], payments: [] };
      const k = l.people[isim];
      k.debts = [...(k.debts || []), { id: uid(), ts: Date.now(), label: nNot.trim() || "Serbest kayıt", amount: miktar, by: who, serbest: true }];
      return l;
    });
    try { navigator.vibrate && navigator.vibrate(12); } catch {}
    setNIsim(""); setNTut(""); setNNot(""); setYeni(false);
  };

  const odemeAl = async (isim) => {
    const miktar = Number(tut) || 0;
    if (miktar <= 0) return;
    const ts = Date.now();
    const id = uid();
    await mutateLed((l) => {
      const k = l.people[isim];
      k.payments = [...(k.payments || []), { id, ts, amount: miktar, pay: nasil, by: who }];
      return l;
    });
    // nakit tahsilat kasaya girer
    await mutate((d) => ({ ...d, collections: [...(d.collections || []), { id, ts, person: isim, amount: miktar, pay: nasil, by: who }] }));
    setTut(""); setAcik(null);
  };

  const kayitSil = async (isim, h) => {
    if (!confirm(`"${h.tip === "borc" ? h.label || "Satış" : "Ödeme"} · ${tl(h.amount)}" kaydı silinsin mi?`)) return;
    await mutateLed((l) => {
      const k = l.people[isim];
      if (h.tip === "borc") k.debts = (k.debts || []).filter((d) => d.id !== h.id);
      else k.payments = (k.payments || []).filter((x) => x.id !== h.id);
      return l;
    });
  };

  const kayitKaydet = async (isim) => {
    const miktar = Number(duzen.amount) || 0;
    if (miktar <= 0) return;
    await mutateLed((l) => {
      const k = l.people[isim];
      const dizi = duzen.tip === "borc" ? k.debts : k.payments;
      const it = dizi.find((x) => x.id === duzen.id);
      if (it) { it.amount = miktar; if (duzen.tip === "borc") it.label = duzen.label; }
      return l;
    });
    setDuzen(null);
  };

  const birlestir = async (hedef, kaynak) => {
    if (!confirm(`"${kaynak}" kaydı "${hedef}" ile birleştirilsin mi?\n\nTüm borçlar ve ödemeler "${hedef}" adı altında toplanacak. Bu işlem geri alınamaz.`)) return;
    await mutateLed((l) => {
      const h = l.people[hedef] || { debts: [], payments: [] };
      const k = l.people[kaynak];
      if (k) {
        h.debts = [...(h.debts || []), ...(k.debts || [])];
        h.payments = [...(h.payments || []), ...(k.payments || [])];
        delete l.people[kaynak];
      }
      l.people[hedef] = h;
      return l;
    });
    setBirlesGoster(null);
  };

  return (
    <div className="px-4 py-4">
      <div className="mb-4 flex items-center gap-2">
        <I n="book" className="h-5 w-5 text-amber-400" />
        <h2 className="font-num text-2xl font-bold uppercase tracking-wide text-white">Veresiye defteri</h2>
      </div>

      <div className="mb-4 grid grid-cols-2 gap-2">
        <Stat label="Toplam alacak" n={toplam} tone="text-amber-400" />
        <Stat label={`${GECIKME_GUN}+ gün ödemeyen`} value={String(gec.length)} tone={gec.length ? "text-rose-400" : "text-slate-400"} delay={40} />
      </div>

      {gruplar.map((g) => (
        <div key={g.join()} className="animate-rise mb-3 rounded-xl border border-sky-400/30 bg-sky-400/10 p-3">
          <p className="text-sm font-bold text-sky-200">Aynı kişi olabilir: {g.map((n) => `"${n}"`).join(" · ")}</p>
          <div className="mt-2 flex flex-wrap gap-1">
            {g.map((hedef) => (
              <button key={hedef} onClick={() => g.filter((x) => x !== hedef).forEach((k) => birlestir(hedef, k))}
                className="press rounded-lg bg-sky-400 px-3 py-1.5 text-xs font-black text-sky-950">
                "{hedef}" altında birleştir
              </button>
            ))}
          </div>
        </div>
      ))}

      {kisiler.length > 3 && (
        <input value={ara} onChange={(e) => setAra(e.target.value)} placeholder="İsim ara…"
          className="mb-3 w-full rounded-xl border border-line bg-deep px-4 py-2.5 text-sm outline-none focus:border-amber-400" />
      )}

      {!yeni ? (
        <button onClick={() => setYeni(true)}
          className="press mb-5 w-full rounded-xl border border-dashed border-line py-3 text-sm font-bold text-slate-400">
          + Borç ekle (üyelik, başka bir şey…)
        </button>
      ) : (
        <div className="animate-rise mb-5 space-y-2 rounded-2xl border border-amber-400/30 bg-deep p-3">
          <p className="text-xs font-bold uppercase tracking-wider text-amber-400">Yeni borç</p>
          <input value={nIsim} onChange={(e) => setNIsim(e.target.value)} placeholder="Kime? (isim)"
            className="w-full rounded-lg border border-line bg-ink px-3 py-2.5 font-semibold outline-none focus:border-amber-400" />
          {kisiler.length > 0 && (
            <div className="flex flex-wrap gap-1">
              {kisiler.slice(0, 8).map((n) => (
                <button key={n} onClick={() => setNIsim(n)} className="rounded-full bg-line/70 px-3 py-1 text-xs text-slate-300">{n}</button>
              ))}
            </div>
          )}
          <input value={nNot} onChange={(e) => setNNot(e.target.value)} placeholder="Ne için? (üyelik ücreti, protein tozu…)"
            className="w-full rounded-lg border border-line bg-ink px-3 py-2.5 text-sm outline-none focus:border-amber-400" />
          <div className="flex items-center gap-2">
            <input inputMode="decimal" value={nTut} onChange={(e) => setNTut(e.target.value.replace(",", "."))} placeholder="Tutar"
              className="w-28 rounded-lg border border-line bg-ink px-3 py-2.5 font-num text-xl font-bold text-amber-300 outline-none focus:border-amber-400" />
            <span className="font-num text-xl font-bold text-amber-300">₺</span>
          </div>
          <div className="flex gap-2 pt-1">
            <button onClick={() => { setYeni(false); setNIsim(""); setNTut(""); setNNot(""); }}
              className="press rounded-xl border border-line/50 px-4 py-3 text-sm font-bold text-slate-400">Vazgeç</button>
            <button onClick={borcEkle} disabled={!nIsim.trim() || !(Number(nTut) > 0)}
              className="press flex-1 rounded-xl bg-amber-400 py-3 font-black text-amber-950 disabled:bg-line/70 disabled:text-slate-500">
              Deftere yaz
            </button>
          </div>
        </div>
      )}

      {bl.length === 0 && (
        <div className="rounded-2xl border border-dashed border-line/50 p-8 text-center">
          <p className="font-bold text-slate-400">Kimsenin borcu yok.</p>
          <p className="mt-1 text-sm text-slate-500/80">Veresiye satış yapınca kişi burada görünür.</p>
        </div>
      )}
      {bl.length > 0 && liste.length === 0 && (
        <p className="py-6 text-center text-sm text-slate-500">"{ara}" ile eşleşen kimse yok.</p>
      )}

      <div className="space-y-2">
        {liste.map(({ isim, p, borc, gun }, i) => {
          const gecikti = gun >= GECIKME_GUN;
          const open = acik === isim;
          const hareketler = [
            ...(p.debts || []).map((d) => ({ ...d, tip: "borc" })),
            ...(p.payments || []).map((x) => ({ ...x, tip: "odeme" })),
          ].sort((a, b) => b.ts - a.ts);
          return (
            <div key={isim} style={{ animationDelay: `${i * 40}ms` }}
              className={`animate-rise overflow-hidden rounded-2xl border transition-colors ${gecikti ? "border-rose-500/50 bg-rose-500/5" : "border-line/50 bg-deep"}`}>
              <button onClick={() => { setAcik(open ? null : isim); setTut(""); setDuzen(null); setBirlesGoster(null); }}
                className="press flex w-full items-center gap-3 p-3 text-left">
                <div className="min-w-0 flex-1">
                  <p className="flex items-center gap-1.5 font-black text-white">
                    {gecikti && <I n="warn" className="h-4 w-4 shrink-0 animate-blink text-rose-500" />}
                    <span className="truncate">{isim}</span>
                  </p>
                  <p className={`mt-0.5 flex items-center gap-1 text-xs font-semibold ${gecikti ? "text-rose-300" : "text-slate-500"}`}>
                    <I n="clock" className="h-3 w-3" />
                    {gun === 0 ? "bugün aldı" : `${gun} gündür ödemedi`}
                    {gecikti && <span className="animate-blink font-black text-rose-500"> · BORÇLU</span>}
                  </p>
                </div>
                <span className={`font-num text-2xl font-bold ${gecikti ? "text-rose-400" : "text-amber-400"}`}>{tl(borc)}</span>
              </button>

              {open && (
                <div className="animate-rise border-t border-line/50 p-3">
                  <p className="mb-2 text-[10px] font-bold uppercase tracking-wider text-slate-500">Hareketler — düzenlemek için üstüne bas</p>
                  <div className="mb-3 max-h-56 space-y-1 overflow-y-auto">
                    {hareketler.map((h) => (
                      duzen && duzen.id === h.id ? (
                        <div key={h.id} className="space-y-2 rounded-lg border border-aqua/40 bg-ink p-2">
                          {h.tip === "borc" && (
                            <input value={duzen.label} onChange={(e) => setDuzen({ ...duzen, label: e.target.value })} placeholder="Açıklama"
                              className="w-full rounded border border-line bg-deep px-2 py-1.5 text-xs outline-none focus:border-aqua" />
                          )}
                          <div className="flex gap-2">
                            <input inputMode="decimal" value={duzen.amount} onChange={(e) => setDuzen({ ...duzen, amount: e.target.value.replace(",", ".") })}
                              className="w-20 rounded border border-line bg-deep px-2 py-1.5 font-num text-base font-bold text-aqua outline-none focus:border-aqua" />
                            <button onClick={() => setDuzen(null)} className="rounded bg-line/70 px-3 text-xs font-bold text-slate-300">Vazgeç</button>
                            <button onClick={() => kayitKaydet(isim)} className="flex-1 rounded bg-aqua text-xs font-black text-ink">Kaydet</button>
                          </div>
                        </div>
                      ) : (
                        <div key={h.id} className="flex items-center gap-2 rounded-lg px-1 py-1 text-xs">
                          <span className="text-slate-500">{new Date(h.ts).toLocaleDateString("tr-TR")}</span>
                          <button onClick={() => setDuzen({ id: h.id, tip: h.tip, amount: String(h.amount), label: h.label || "" })}
                            className="min-w-0 flex-1 truncate text-left text-slate-400 underline decoration-line decoration-dotted underline-offset-2">
                            {h.tip === "borc" ? h.label || "Satış" : `Ödeme (${PAY[h.pay]?.label || ""})`}
                            {h.serbest && <span className="ml-1 text-[9px] uppercase tracking-wider text-slate-500">elle</span>}
                          </button>
                          <span className={`font-bold ${h.tip === "borc" ? "text-amber-300" : "text-emerald-400"}`}>
                            {h.tip === "borc" ? "+" : "−"}{tl(h.amount)}
                          </span>
                          <button onClick={() => kayitSil(isim, h)} className="press rounded p-1 text-slate-500"><I n="x" className="h-3.5 w-3.5" /></button>
                        </div>
                      )
                    ))}
                  </div>

                  <p className="mb-2 text-[10px] font-bold uppercase tracking-wider text-emerald-300">Ödeme al</p>
                  <div className="flex gap-2">
                    <input inputMode="decimal" value={tut} onChange={(e) => setTut(e.target.value.replace(",", "."))} placeholder="Tutar"
                      className="w-24 rounded-lg border border-line bg-ink px-3 py-2 font-bold outline-none focus:border-emerald-400" />
                    <button onClick={() => setTut(String(borc))} className="press rounded-lg bg-line/70 px-3 text-xs font-bold text-slate-300">Hepsi</button>
                    <div className="flex flex-1 gap-1">
                      {["nakit", "iban"].map((k) => (
                        <button key={k} onClick={() => setNasil(k)}
                          className={`press flex-1 rounded-lg text-xs font-black ${nasil === k ? PAY[k].cls : "bg-line/70 text-slate-400"}`}>
                          {PAY[k].label}
                        </button>
                      ))}
                    </div>
                  </div>
                  <button onClick={() => odemeAl(isim)} disabled={!tut || Number(tut) <= 0}
                    className="press mt-2 w-full rounded-xl bg-emerald-400 py-3 font-black text-emerald-950 disabled:bg-line/70 disabled:text-slate-500">
                    Ödemeyi kaydet
                  </button>
                  <p className="mt-2 text-center text-[10px] text-slate-500/80">Nakit ödeme kasaya eklenir.</p>

                  {kisiler.length > 1 && (
                    <div className="mt-4 border-t border-line/50 pt-3">
                      {birlesGoster === isim ? (
                        <>
                          <p className="mb-2 text-[10px] font-bold uppercase tracking-wider text-sky-300">Kimi bu isme katalım?</p>
                          <div className="flex flex-wrap gap-1">
                            {kisiler.filter((n) => n !== isim).map((n) => (
                              <button key={n} onClick={() => birlestir(isim, n)}
                                className="press rounded-full bg-line/70 px-3 py-1.5 text-xs font-bold text-slate-200">{n}</button>
                            ))}
                          </div>
                          <button onClick={() => setBirlesGoster(null)} className="mt-2 text-xs text-slate-500">Vazgeç</button>
                        </>
                      ) : (
                        <button onClick={() => setBirlesGoster(isim)} className="text-xs font-bold text-sky-300">
                          Başka bir ismi bununla birleştir
                        </button>
                      )}
                    </div>
                  )}
                </div>
              )}
            </div>
          );
        })}
      </div>

      {Object.keys(ledger?.people || {}).length > bl.length && (
        <div className="mt-8">
          <p className="mb-2 text-xs font-bold uppercase tracking-wider text-slate-500">Borcu kapananlar</p>
          {Object.entries(ledger.people).filter(([n]) => !bl.some((b) => b.isim === n) && suz(n)).map(([n]) => (
            <div key={n} className="flex justify-between border-b border-line/50 py-2 text-sm">
              <span className="text-slate-400">{n}</span>
              <span className="font-bold text-emerald-400">Ödendi</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}


function GecmisTab({ hist }) {
  const [acik, setAcik] = useState(null);
  return (
    <div className="px-4 py-4">
      <div className="mb-4 flex items-center gap-2">
        <I n="clock" className="h-5 w-5 text-aqua" />
        <h2 className="text-xl font-black text-white">Geçmiş satışlar</h2>
      </div>

      {hist.length === 0 && (
        <div className="rounded-2xl border border-dashed border-line/50 p-8 text-center">
          <p className="font-bold text-slate-400">Henüz kapatılmış gün yok.</p>
          <p className="mt-1 text-sm text-slate-500/80">Gün sonunda "Günü kapat" dedikçe buraya düşer.</p>
        </div>
      )}

      <div className="space-y-2">
        {hist.map((h) => {
          const t = totals(h);
          const open = acik === h.date + h.closedAt;
          return (
            <div key={h.date + h.closedAt} className="overflow-hidden rounded-2xl bg-deep">
              <button onClick={() => setAcik(open ? null : h.date + h.closedAt)} className="flex w-full items-center gap-3 p-3 text-left">
                <div className="min-w-0 flex-1">
                  <p className="font-black text-white">{prettyDate(h.date)}</p>
                  <p className="mt-0.5 text-xs text-slate-500">{h.sales.length} hareket · kasa {tl(t.kasa)}</p>
                </div>
                <span className="text-lg font-black text-aqua">{tl(t.ciro)}</span>
                <I n="arrow" className={`h-4 w-4 text-slate-500/80 transition ${open ? "rotate-90" : ""}`} />
              </button>

              {open && (
                <div className="border-t border-line/50 p-3">
                  <div className="mb-3 space-y-1 text-xs">
                    <Row k="Nakit" v={tl(t.nakit)} />
                    <Row k="IBAN" v={tl(t.iban)} />
                    <Row k="Veresiye" v={tl(t.veresiye)} tone="text-amber-400" />
                    <Row k={`İkram (${t.ikramAdet})`} v={tl(t.ikramDeger)} tone="text-violet-300" />
                    <Row k="Harcama" v={`-${tl(t.giderHepsi)}`} tone="text-rose-400" />
                    <Row k="Net kazanç" v={tl(t.ciro - t.giderHepsi)} bold tone="text-emerald-400" />
                  </div>
                  <p className="mb-1 text-[10px] font-bold uppercase tracking-wider text-slate-500">Ürünler</p>
                  {h.products.map((p) => {
                    const adet = h.sales.filter((s) => s.productId === p.id).length;
                    if (!adet) return null;
                    const tutar = h.sales.filter((s) => s.productId === p.id).reduce((a, s) => a + s.price, 0);
                    return (
                      <div key={p.id} className="flex justify-between py-1 text-xs">
                        <span className="text-slate-400">{p.name} × {adet}</span>
                        <span className="font-bold text-aqua">{tl(tutar)}</span>
                      </div>
                    );
                  })}
                  <p className="mb-1 mt-3 text-[10px] font-bold uppercase tracking-wider text-slate-500">Kim ne yaptı</p>
                  <CalisanKirilim day={h} />

                  <p className="mb-1 mt-3 text-[10px] font-bold uppercase tracking-wider text-slate-500">Tüm hareketler ({h.sales.length})</p>
                  <div className="space-y-1">
                    {[...h.sales].reverse().map((s) => (
                      <div key={s.id} className="flex items-center gap-2 text-xs">
                        <span className="text-slate-500/80">{clock(s.ts)}</span>
                        <span className="text-slate-300">{h.products.find((p) => p.id === s.productId)?.name}</span>
                        <span className="min-w-0 flex-1 truncate text-slate-500">{s.person || PAY[s.pay]?.label}</span>
                        <span className={`font-bold ${s.pay === "ikram" ? "text-violet-300" : "text-aqua"}`}>
                          {s.pay === "ikram" ? "İkram" : tl(s.price)}
                        </span>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// Saat saat ciro dağılımı
function saatlik(day) {
  const a = Array(24).fill(0);
  (day.sales || []).forEach((s) => { a[new Date(s.ts).getHours()] += s.price; });
  return a;
}

function SaatGrafik({ day }) {
  const a = saatlik(day);
  const enB = Math.max(1, ...a);
  const dolu = a.map((v, i) => ({ v, i })).filter((x) => x.v > 0);
  if (!dolu.length) return null;
  const bas = Math.max(0, Math.min(...dolu.map((x) => x.i)) - 1);
  const son = Math.min(23, Math.max(...dolu.map((x) => x.i)) + 1);
  const dilim = a.map((v, i) => ({ v, i })).slice(bas, son + 1);
  const zirve = dolu.reduce((m, x) => (x.v > m.v ? x : m), dolu[0]);
  return (
    <div className="rounded-2xl border border-line/40 bg-deep p-3">
      <div className="mb-2 flex items-baseline justify-between">
        <p className="text-[10px] font-bold uppercase tracking-wider text-slate-500">Saatlere göre ciro</p>
        <p className="text-xs font-bold text-aqua">En yoğun {String(zirve.i).padStart(2, "0")}:00 · {tl(zirve.v)}</p>
      </div>
      <div className="flex h-24 items-end gap-[3px]">
        {dilim.map(({ v, i }) => (
          <div key={i} className="flex flex-1 flex-col items-center gap-1">
            <div className="flex w-full flex-1 items-end">
              <div className={`w-full rounded-t transition-all duration-700 ease-out ${v === zirve.v ? "bg-aqua" : "bg-aqua/35"}`}
                style={{ height: `${(v / enB) * 100}%` }} />
            </div>
            <span className="font-num text-[9px] text-slate-500">{String(i).padStart(2, "0")}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// Ödeme dağılımı şeridi
function DagilimCubugu({ t }) {
  const top = t.nakit + t.iban + t.veresiye;
  if (!top) return null;
  const parts = [
    { k: "Nakit", v: t.nakit, c: "bg-emerald-500" },
    { k: "IBAN", v: t.iban, c: "bg-sky-400" },
    { k: "Veresiye", v: t.veresiye, c: "bg-amber-400" },
  ].filter((x) => x.v > 0);
  return (
    <div className="rounded-2xl border border-line/40 bg-deep p-3">
      <p className="mb-2 text-[10px] font-bold uppercase tracking-wider text-slate-500">Para nasıl geldi</p>
      <div className="flex h-3 overflow-hidden rounded-full bg-line/70">
        {parts.map((x) => (
          <div key={x.k} className={`${x.c} transition-all duration-700 ease-out`} style={{ width: `${(x.v / top) * 100}%` }} />
        ))}
      </div>
      <div className="mt-2 flex flex-wrap gap-x-3 gap-y-1 text-[11px]">
        {parts.map((x) => (
          <span key={x.k} className="flex items-center gap-1 text-slate-400">
            <span className={`h-2 w-2 rounded-full ${x.c}`} /> {x.k} %{Math.round((x.v / top) * 100)}
          </span>
        ))}
      </div>
    </div>
  );
}

function CloseTab({ day, ledger, hist, onClose }) {
  const t = totals(day);
  const adet = day.sales.filter((s) => s.pay !== "ikram").length;
  const ortalama = adet ? t.ciro / adet : 0;
  const cikan = day.sales.length;
  const basStok = day.products.filter(stokVar).reduce((a, p) => a + (day.startStock[p.id] || 0), 0);
  const kalanStok = basStok - day.sales.filter((s) => { const p = day.products.find((x) => x.id === s.productId); return p && stokVar(p); }).length;

  // Karşılaştırma
  const oncekiler = (hist || []).filter((h) => h.date !== day.date);
  const dun = oncekiler[0];
  const ort7 = oncekiler.slice(0, 7).length
    ? oncekiler.slice(0, 7).reduce((a, h) => a + totals(h).ciro, 0) / oncekiler.slice(0, 7).length
    : 0;
  const fark = (a, b) => (b > 0 ? Math.round(((a - b) / b) * 100) : null);
  const dunFark = dun ? fark(t.ciro, totals(dun).ciro) : null;
  const ortFark = ort7 ? fark(t.ciro, ort7) : null;

  const enCok = [...day.products]
    .map((p) => ({ p, adet: day.sales.filter((s) => s.productId === p.id && s.pay !== "ikram").length, tutar: day.sales.filter((s) => s.productId === p.id).reduce((a, s) => a + s.price, 0) }))
    .sort((a, b) => b.tutar - a.tutar)[0];

  return (
    <div className="px-4 py-4">
      <div className="mb-4 flex items-center gap-2">
        <I n="moon" className="h-5 w-5 text-aqua" />
        <h2 className="font-num text-2xl font-bold uppercase tracking-wide text-white">Gün sonu — {prettyDate(day.date)}</h2>
      </div>

      <div className="relative overflow-hidden rounded-2xl border border-aqua/20 bg-gradient-to-b from-aqua/20 to-transparent p-4">
        <span className="pointer-events-none absolute inset-y-0 -left-1/3 w-1/3 animate-shimmer bg-gradient-to-r from-transparent via-white/5 to-transparent" />
        <p className="text-xs font-bold uppercase tracking-wider text-aqua">Kasada olması gereken</p>
        <p className="font-num text-5xl font-bold leading-none text-white"><Money n={t.kasa} /></p>
        <p className="mt-1 text-xs text-slate-400">
          Sabahki {tl(day.startCash)} + nakit {tl(t.nakit)}
          {t.tahsilNakit > 0 && ` + tahsilat ${tl(t.tahsilNakit)}`} − harcama {tl(t.giderNakit)}
        </p>
      </div>

      <div className="mt-3 grid grid-cols-2 gap-2">
        <Stat label="Toplam ciro" n={t.ciro} tone="text-aqua" />
        <Stat label="Net kazanç" n={t.ciro - t.giderHepsi} tone="text-emerald-400" delay={40} />
        <Stat label={`${adet} satış · ortalama`} n={ortalama} tone="text-slate-200" delay={80} />
        <Stat label="Dolaptan çıkan" value={`${cikan} adet`} tone="text-slate-200" delay={120} />
      </div>

      {(dunFark !== null || ortFark !== null) && (
        <div className="mt-3 flex gap-2">
          {dunFark !== null && <Kiyas etiket="Düne göre" yuzde={dunFark} alt={tl(totals(dun).ciro)} />}
          {ortFark !== null && <Kiyas etiket="7 gün ort." yuzde={ortFark} alt={tl(ort7)} />}
        </div>
      )}

      <div className="mt-3 space-y-3">
        <DagilimCubugu t={t} />
        <SaatGrafik day={day} />
      </div>

      <div className="mt-3 space-y-1 rounded-2xl border border-line/40 bg-deep p-4 text-sm">
        <Row k="Nakit" v={tl(t.nakit)} />
        <Row k="IBAN'a gelen" v={tl(t.iban)} />
        <Row k="Veresiye (tahsil edilmedi)" v={tl(t.veresiye)} tone="text-amber-400" />
        <Row k={`İkram — ${t.ikramAdet} adet`} v={tl(t.ikramDeger)} tone="text-violet-300" />
        <Row k="Ekstra harcama" v={`-${tl(t.giderHepsi)}`} tone="text-rose-400" />
        {t.tahsilat > 0 && <Row k="Tahsil edilen eski veresiye" v={tl(t.tahsilat)} tone="text-emerald-400" />}
        <div className="my-2 border-t border-line/50" />
        <Row k="Günün net kazancı" v={tl(t.ciro - t.giderHepsi)} bold tone="text-emerald-400" />
        {enCok && enCok.tutar > 0 && <Row k="En çok kazandıran" v={`${enCok.p.name} · ${tl(enCok.tutar)}`} tone="text-aqua" />}
        {basStok > 0 && <Row k="Stok" v={`${basStok - kalanStok} çıktı · ${kalanStok} kaldı`} />}
      </div>

      {day.expenses.length > 0 && (
        <>
          <p className="mb-2 mt-5 text-xs font-bold uppercase tracking-wider text-rose-400">Harcamalar</p>
          <div className="space-y-1">
            {day.expenses.map((e) => (
              <div key={e.id} className="flex items-center gap-2 rounded-lg bg-rose-500/10 px-3 py-2 text-sm">
                <span className="min-w-0 flex-1 truncate">{e.desc}</span>
                <span className="text-[10px] text-slate-500">{clock(e.ts)} · {e.by}</span>
                <span className="font-bold text-rose-300">-{tl(e.amount)}</span>
              </div>
            ))}
          </div>
        </>
      )}

      <p className="mb-2 mt-5 text-xs font-bold uppercase tracking-wider text-aqua">Kim ne yaptı</p>
      <CalisanKirilim day={day} />

      <p className="mb-2 mt-5 text-xs font-bold uppercase tracking-wider text-aqua">Hangi üründen ne kazandık</p>
      <div className="space-y-2">
        {day.products.map((p) => {
          const cik = soldCount(day, p.id);
          const ikram = day.sales.filter((s) => s.productId === p.id && s.pay === "ikram").length;
          const ad = cik - ikram;
          const tutar = day.sales.filter((s) => s.productId === p.id).reduce((a, s) => a + s.price, 0);
          const kalan = (day.startStock[p.id] || 0) - cik;
          return (
            <div key={p.id} className="rounded-xl border border-line/40 bg-deep p-3">
              <div className="flex items-baseline gap-2">
                <span className="font-bold text-white">{p.name}</span>
                <span className="text-xs text-slate-500">
                  {ad} satıldı{ikram > 0 && <span className="text-violet-300"> · {ikram} ikram</span>}
                  {stokVar(p) && ` · dolapta ${kalan} kaldı`}
                </span>
                <span className="ml-auto font-num text-xl font-bold text-aqua">{tl(tutar)}</span>
              </div>
              <div className="mt-2 h-1.5 overflow-hidden rounded-full bg-line/70">
                <div className="h-full rounded-full bg-aqua transition-all duration-700 ease-out" style={{ width: `${t.ciro ? (tutar / t.ciro) * 100 : 0}%` }} />
              </div>
            </div>
          );
        })}
      </div>

      {borclular(ledger).length > 0 && (
        <div className="mt-5 rounded-2xl border border-amber-400/30 bg-amber-400/5 p-3">
          <p className="text-xs font-bold uppercase tracking-wider text-amber-400">Toplam açık alacak</p>
          <p className="font-num text-3xl font-bold text-amber-300">{tl(borclular(ledger).reduce((a, b) => a + b.borc, 0))}</p>
          <p className="mt-1 text-xs text-slate-400">
            {borclular(ledger).length} kişi
            {borclular(ledger).filter((b) => b.gun >= GECIKME_GUN).length > 0 &&
              ` · ${borclular(ledger).filter((b) => b.gun >= GECIKME_GUN).length} tanesi ${GECIKME_GUN}+ gündür ödemiyor`}
          </p>
        </div>
      )}

      {t.veresiye > 0 && (
        <>
          <p className="mb-2 mt-5 text-xs font-bold uppercase tracking-wider text-amber-400">Bugün verilen veresiye</p>
          <div className="space-y-1">
            {Object.entries(day.sales.filter((s) => s.pay === "veresiye").reduce((a, s) => ({ ...a, [s.person]: (a[s.person] || 0) + s.price }), {})).map(([n, v]) => (
              <div key={n} className="flex justify-between rounded-lg bg-amber-400/10 px-3 py-2 text-sm">
                <span>{n}</span><span className="font-black text-amber-300">{tl(v)}</span>
              </div>
            ))}
          </div>
        </>
      )}

      {t.ikramAdet > 0 && (
        <>
          <p className="mb-2 mt-5 text-xs font-bold uppercase tracking-wider text-violet-300">İkramlar</p>
          <div className="space-y-1">
            {day.sales.filter((s) => s.pay === "ikram").map((s) => (
              <div key={s.id} className="flex items-center gap-2 rounded-lg bg-violet-400/10 px-3 py-2 text-sm">
                <span>{day.products.find((p) => p.id === s.productId)?.name}</span>
                <span className="truncate text-slate-400">{s.person || "—"}</span>
                <span className="ml-auto text-[10px] text-slate-500">{clock(s.ts)} · {s.by}</span>
                <span className="font-bold text-violet-300">{tl(s.listPrice || 0)}</span>
              </div>
            ))}
          </div>
        </>
      )}

      <button onClick={() => window.print()}
        className="press mt-6 flex w-full items-center justify-center gap-2 rounded-2xl border border-aqua/40 bg-aqua/10 py-4 font-black text-aqua">
        <I n="page" className="h-5 w-5" /> PDF olarak kaydet / yazdır
      </button>

      <button onClick={onClose} className="press mt-2 w-full rounded-2xl border border-line/50 py-4 font-black text-slate-300">
        Günü kapat ve kaydet
      </button>
    </div>
  );
}

const Kiyas = ({ etiket, yuzde, alt }) => {
  const iyi = yuzde >= 0;
  return (
    <div className={`flex-1 animate-rise rounded-xl border p-3 ${iyi ? "border-emerald-400/30 bg-emerald-400/10" : "border-rose-500/30 bg-rose-500/10"}`}>
      <p className="text-[10px] font-bold uppercase tracking-wider text-slate-400">{etiket}</p>
      <p className={`font-num text-2xl font-bold leading-none ${iyi ? "text-emerald-400" : "text-rose-400"}`}>
        {iyi ? "+" : ""}{yuzde}%
      </p>
      <p className="mt-0.5 text-[10px] text-slate-500">{alt}</p>
    </div>
  );
};


const Row = ({ k, v, bold, tone = "text-slate-200" }) => (
  <div className="flex justify-between">
    <span className="text-slate-400">{k}</span>
    <span className={`${bold ? "font-black" : "font-semibold"} ${tone}`}>{v}</span>
  </div>
);

function SettingsTab({ day, mutate, onLogout }) {
  const [draft, setDraft] = useState(day.products.map((p) => ({ ...p, price: String(p.price ?? 0), serbest: !!p.serbest, stok: p.stok !== false })));
  const [stock, setStock] = useState(Object.fromEntries(day.products.map((p) => [p.id, String(day.startStock[p.id] ?? 0)])));
  const [cash, setCash] = useState(String(day.startCash));
  const [saved, setSaved] = useState(false);
  const [msg, setMsg] = useState("");

  const edit = (i, k, v) => setDraft((d) => d.map((p, j) => (j === i ? { ...p, [k]: v } : p)));

  const sil = (i) => {
    const p = draft[i];
    if (day.sales.some((s) => s.productId === p.id)) {
      setMsg(`${p.name} bugün satılmış. Silmek için önce o satışları geri al.`);
      return;
    }
    if (!confirm(`${p.name} silinsin mi?`)) return;
    setDraft((d) => d.filter((_, j) => j !== i));
    setMsg("");
  };

  const ekle = () => setDraft((d) => [...d, { id: uid(), name: "", price: "0", serbest: false, stok: true }]);

  const kaydet = async () => {
    const temiz = draft.filter((p) => p.name.trim()).map((p) => ({
      id: p.id, name: p.name.trim(), price: p.serbest ? 0 : Number(p.price) || 0, serbest: !!p.serbest, stok: !!p.stok,
    }));
    if (!temiz.length) { setMsg("En az bir ürün olmalı."); return; }
    await mutate((d) => ({
      ...d,
      products: temiz,
      startStock: Object.fromEntries(temiz.map((p) => [p.id, p.stok ? Number(stock[p.id]) || 0 : 0])),
      startCash: Number(cash) || 0,
    }));
    setMsg("");
    setSaved(true);
    setTimeout(() => setSaved(false), 2000);
  };

  return (
    <div className="px-4 py-4">
      <h2 className="mb-1 text-xl font-black text-white">Ayarlar</h2>
      <p className="mb-4 text-sm text-slate-500">Değiştir, sonra aşağıdan Kaydet'e bas.</p>
      <p className="mb-3 rounded-lg bg-deep p-3 text-xs leading-relaxed text-slate-400">
        <b className="text-amber-300">Fiyat serbest</b>: sabit fiyatı olmayan ürün — satarken tutarı elle yazarsın.<br />
        <b className="text-aqua">Stok takibi</b>: kapalıysa dolap sayımına girmez (üyelik, hizmet gibi şeyler için).
      </p>

      <p className="mb-2 text-xs font-bold uppercase tracking-wider text-aqua">Ürünler ve fiyatlar</p>
      <div className="space-y-2">
        {draft.map((p, i) => (
          <div key={p.id} className="animate-rise space-y-2 rounded-xl border border-line/40 bg-deep p-3">
            <div className="flex items-center gap-2">
              <input value={p.name} onChange={(e) => edit(i, "name", e.target.value)} placeholder="Ürün adı"
                className="min-w-0 flex-1 rounded-lg border border-line/50 bg-ink px-2 py-2 font-semibold text-white outline-none focus:border-aqua" />
              {!p.serbest && (
                <>
                  <input inputMode="decimal" value={p.price}
                    onChange={(e) => edit(i, "price", e.target.value.replace(",", "."))}
                    className="w-16 rounded-lg border border-line bg-ink px-2 py-2 text-right font-num text-lg font-bold text-aqua outline-none focus:border-aqua" />
                  <span className="font-num text-lg font-bold text-aqua">₺</span>
                </>
              )}
              <button onClick={() => sil(i)} className="press rounded-lg bg-line/70 p-2 text-rose-400"><I n="x" className="h-4 w-4" /></button>
            </div>
            <div className="flex gap-2">
              <Anahtar acik={p.serbest} onBas={() => edit(i, "serbest", !p.serbest)} etiket="Fiyat serbest" renk="amber" />
              <Anahtar acik={p.stok} onBas={() => edit(i, "stok", !p.stok)} etiket="Stok takibi" renk="aqua" />
            </div>
          </div>
        ))}
      </div>
      <button onClick={ekle} className="mt-2 w-full rounded-xl border border-dashed border-line py-3 text-sm font-bold text-slate-400">+ Ürün ekle</button>

      <p className="mb-2 mt-6 text-xs font-bold uppercase tracking-wider text-aqua">Sabah dolaptaki adet</p>
      <div className="space-y-2">
        {draft.filter((p) => p.stok).map((p) => (
          <div key={p.id} className="flex items-center gap-3 rounded-xl bg-deep p-3">
            <span className="min-w-0 flex-1 truncate text-sm font-semibold">{p.name || "—"}</span>
            <Stepper value={stock[p.id] ?? "0"} onChange={(v) => setStock((s) => ({ ...s, [p.id]: v }))} />
          </div>
        ))}
      </div>

      <div className="mt-4 flex items-center gap-3 rounded-xl bg-deep p-3">
        <span className="flex-1 text-sm font-semibold">Sabah kasadaki para</span>
        <input inputMode="decimal" value={cash} onChange={(e) => setCash(e.target.value.replace(",", "."))}
          className="w-24 rounded-lg border border-line bg-ink px-2 py-1.5 text-right font-black text-aqua outline-none focus:border-aqua" />
        <span className="font-black text-aqua">₺</span>
      </div>

      {msg && <p className="mt-3 rounded-lg bg-rose-500/15 px-3 py-2 text-sm text-rose-300">{msg}</p>}

      <button onClick={kaydet}
        className={`mt-4 flex w-full items-center justify-center gap-2 rounded-2xl py-4 text-lg font-black transition ${saved ? "bg-emerald-400 text-emerald-950" : "bg-aqua text-ink"}`}>
        <I n="check" className="h-5 w-5" /> {saved ? "Kaydedildi" : "Kaydet"}
      </button>

      <p className="mb-2 mt-8 text-xs font-bold uppercase tracking-wider text-aqua">Bildirimler</p>
      <BildirimKutusu />

      <button onClick={onLogout} className="press mt-8 w-full rounded-2xl border border-line/50 py-3 text-sm font-bold text-slate-500">
        Çıkış yap
      </button>
    </div>
  );
}

const Anahtar = ({ acik, onBas, etiket, renk }) => (
  <button onClick={onBas}
    className={`press flex flex-1 items-center gap-2 rounded-lg border px-2.5 py-2 text-xs font-bold transition-colors ${
      acik ? (renk === "amber" ? "border-amber-400/50 bg-amber-400/15 text-amber-300" : "border-aqua/50 bg-aqua/15 text-aqua")
           : "border-line/50 bg-ink text-slate-500"}`}>
    <span className={`flex h-4 w-7 shrink-0 items-center rounded-full p-0.5 transition-colors ${acik ? (renk === "amber" ? "bg-amber-400" : "bg-aqua") : "bg-line"}`}>
      <span className={`h-3 w-3 rounded-full bg-ink transition-transform duration-200 ${acik ? "translate-x-3" : ""}`} />
    </span>
    {etiket}
  </button>
);

function BildirimKutusu() {
  const [izin, setIzin] = useState(("Notification" in window) ? Notification.permission : "yok");
  if (izin === "yok") return <p className="rounded-xl bg-deep p-3 text-sm text-slate-500">Bu telefon bildirim desteklemiyor.</p>;
  return (
    <div className="rounded-xl border border-line/50 bg-deep p-3">
      {izin === "granted" ? (
        <p className="text-sm font-semibold text-emerald-400">Bildirimler açık.</p>
      ) : izin === "denied" ? (
        <p className="text-sm text-slate-400">Bildirimlere izin verilmemiş. Telefon ayarlarından Chrome için bu siteye izin ver.</p>
      ) : (
        <button onClick={async () => setIzin(await Notification.requestPermission())}
          className="press w-full rounded-lg bg-aqua py-2.5 text-sm font-black text-ink">Bildirimleri aç</button>
      )}
      <p className="mt-2 text-[11px] leading-snug text-slate-500">
        {GECIKME_GUN}+ gündür ödemeyen varsa, uygulamayı günün ilk açışında hatırlatır.
      </p>
    </div>
  );
}

// Yazdırma / PDF çıktısı — sadece yazdırırken görünür
function PrintRapor({ day, ledger, who }) {
  const t = totals(day);
  const adet = day.sales.filter((s) => s.pay !== "ikram").length;
  const bl = borclular(ledger);
  const cal = calisanlar(day);
  const para = (n) => `${(Math.round(n * 100) / 100).toLocaleString("tr-TR")} TL`;
  return (
    <div id="rapor">
      <h1>ÖZBEY SPOR SALONU</h1>
      <p style={{ fontSize: "10pt", margin: "2pt 0 10pt", color: "#555" }}>
        Gün sonu raporu · {prettyDate(day.date)} · Çıktıyı alan: {who} · {new Date().toLocaleTimeString("tr-TR", { hour: "2-digit", minute: "2-digit" })}
      </p>

      <div className="kutu">
        <div style={{ fontSize: "9pt", letterSpacing: ".08em", color: "#555" }}>KASADA OLMASI GEREKEN</div>
        <div className="buyuk">{para(t.kasa)}</div>
        <div style={{ fontSize: "9pt", color: "#555" }}>
          Sabah {para(day.startCash)} + nakit satış {para(t.nakit)}
          {t.tahsilNakit > 0 && ` + tahsilat ${para(t.tahsilNakit)}`} − harcama {para(t.giderNakit)}
        </div>
      </div>

      <div className="bl">Özet</div>
      <table>
        <tbody>
          <tr><td>Toplam ciro</td><td className="sag"><b>{para(t.ciro)}</b></td></tr>
          <tr><td>Satış adedi / ortalama</td><td className="sag">{adet} adet · {para(adet ? t.ciro / adet : 0)}</td></tr>
          <tr><td>Nakit</td><td className="sag">{para(t.nakit)}</td></tr>
          <tr><td>IBAN</td><td className="sag">{para(t.iban)}</td></tr>
          <tr><td>Veresiye (tahsil edilmedi)</td><td className="sag">{para(t.veresiye)}</td></tr>
          <tr><td>İkram ({t.ikramAdet} adet)</td><td className="sag">{para(t.ikramDeger)}</td></tr>
          <tr><td>Ekstra harcama</td><td className="sag">-{para(t.giderHepsi)}</td></tr>
          {t.tahsilat > 0 && <tr><td>Tahsil edilen eski veresiye</td><td className="sag">{para(t.tahsilat)}</td></tr>}
          <tr><td><b>Günün net kazancı</b></td><td className="sag"><b>{para(t.ciro - t.giderHepsi)}</b></td></tr>
        </tbody>
      </table>

      <div className="bl">Ürünler</div>
      <table>
        <thead><tr><th>Ürün</th><th className="sag">Satıldı</th><th className="sag">İkram</th><th className="sag">Kalan</th><th className="sag">Tutar</th></tr></thead>
        <tbody>
          {day.products.map((p) => {
            const cik = soldCount(day, p.id);
            const ik = day.sales.filter((s) => s.productId === p.id && s.pay === "ikram").length;
            const tutar = day.sales.filter((s) => s.productId === p.id).reduce((a, s) => a + s.price, 0);
            return (
              <tr key={p.id}>
                <td>{p.name}</td>
                <td className="sag">{cik - ik}</td>
                <td className="sag">{ik || "—"}</td>
                <td className="sag">{stokVar(p) ? (day.startStock[p.id] || 0) - cik : "—"}</td>
                <td className="sag">{para(tutar)}</td>
              </tr>
            );
          })}
        </tbody>
      </table>

      <div className="bl">Çalışanlar</div>
      <table>
        <thead><tr><th>Kişi</th><th className="sag">Satış</th><th className="sag">Ciro</th><th className="sag">Nakit</th><th className="sag">Harcama</th></tr></thead>
        <tbody>
          {cal.map((c) => (
            <tr key={c.isim}>
              <td>{c.isim}</td>
              <td className="sag">{c.adet}</td>
              <td className="sag">{para(c.ciro)}</td>
              <td className="sag">{para(c.nakit)}</td>
              <td className="sag">{c.gider ? para(c.gider) : "—"}</td>
            </tr>
          ))}
        </tbody>
      </table>

      {day.expenses.length > 0 && (
        <>
          <div className="bl">Harcamalar</div>
          <table>
            <tbody>
              {day.expenses.map((e) => (
                <tr key={e.id}><td>{e.desc} <span style={{ color: "#888" }}>({e.by})</span></td><td className="sag">-{para(e.amount)}</td></tr>
              ))}
            </tbody>
          </table>
        </>
      )}

      {bl.length > 0 && (
        <>
          <div className="bl">Açık alacaklar — toplam {para(bl.reduce((a, b) => a + b.borc, 0))}</div>
          <table>
            <thead><tr><th>Kişi</th><th className="sag">Gün</th><th className="sag">Borç</th></tr></thead>
            <tbody>
              {bl.map((b) => (
                <tr key={b.isim}>
                  <td>{b.isim}{b.gun >= GECIKME_GUN ? " (BORÇLU)" : ""}</td>
                  <td className="sag">{b.gun}</td>
                  <td className="sag">{para(b.borc)}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </>
      )}

      <div className="bl">Tüm hareketler ({day.sales.length})</div>
      <table>
        <thead><tr><th>Saat</th><th>Ürün</th><th>Ödeme</th><th className="sag">Tutar</th></tr></thead>
        <tbody>
          {day.sales.map((s) => (
            <tr key={s.id}>
              <td>{clock(s.ts)}</td>
              <td>{day.products.find((p) => p.id === s.productId)?.name}</td>
              <td>{s.pay === "veresiye" ? `Veresiye · ${s.person}` : s.pay === "ikram" ? `İkram${s.person ? " · " + s.person : ""}` : PAY[s.pay]?.label}</td>
              <td className="sag">{s.pay === "ikram" ? "—" : para(s.price)}</td>
            </tr>
          ))}
        </tbody>
      </table>

      <p style={{ fontSize: "9pt", marginTop: "16pt", color: "#555" }}>
        Sayılan kasa: ______________ TL &nbsp;&nbsp;&nbsp; Fark: ______________ TL &nbsp;&nbsp;&nbsp; İmza: ______________
      </p>
    </div>
  );
}

function TabBar({ tab, setTab, borcSayisi }) {
  const items = [
    { k: "satis", label: "Satış", icon: "drop" },
    { k: "veresiye", label: "Veresiye", icon: "book", badge: borcSayisi },
    { k: "gecmis", label: "Geçmiş", icon: "clock" },
    { k: "gunsonu", label: "Gün sonu", icon: "moon" },
    { k: "ayar", label: "Ayarlar", icon: "gear" },
  ];
  return (
    <div className="fixed bottom-0 left-0 right-0 z-20 flex border-t border-line/50 bg-ink/90 pb-[env(safe-area-inset-bottom)] backdrop-blur">
      {items.map(({ k, label, icon, badge }) => (
        <button key={k} onClick={() => setTab(k)} className={`press relative flex flex-1 flex-col items-center gap-1 py-3 transition-colors ${tab === k ? "text-aqua" : "text-slate-500"}`}>
          {tab === k && <span className="absolute inset-x-3 top-0 h-0.5 animate-fade rounded-full bg-aqua" />}
          <I n={icon} className={`h-5 w-5 transition-transform duration-300 ${tab === k ? "scale-110" : ""}`} />
          {badge > 0 && (
            <span className="absolute right-[20%] top-1.5 flex h-4 min-w-4 animate-throb items-center justify-center rounded-full bg-rose-500 px-1 text-[10px] font-black text-white">
              {badge}
            </span>
          )}
          <span className="text-[10px] font-bold">{label}</span>
        </button>
      ))}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
